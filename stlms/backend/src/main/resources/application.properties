# Application
spring.application.name=stlms-backend
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:stlmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# H2Dialect is auto-detected — explicit setting suppressed to avoid deprecation warning
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Disable open-in-view to prevent lazy-loading during view rendering
spring.jpa.open-in-view=false

# H2 Console (development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Seed data — runs after schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Springdoc OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.stlms=INFO
logging.level.org.springframework.web=WARN
